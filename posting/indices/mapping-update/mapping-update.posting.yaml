name: Mapping Update
method: PUT
url: $ES_URL/movies
body:
  content: |-
    {
        "mappings": {
            "properties": {
                "id": {"type": "integer"},
                "year": {"type": "date"},
                "genre": {"type": "keyword"},
                "title": {"type": "text", "analyzer": "english"}
            }
        }
    }
  content_type: application/json
headers:
- name: Content-Type
  value: application/json
